<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Admin Dashboard</title>
</head>
<body>
    <div class="header">
        <div class="userinfo">
            <div class="searchbar">
                <img src="assets/magnify.png" alt="">
                <div></div>
            </div>
            <div class="user">
                <img class='notification' src="assets/bell-alert-outline.png" alt="">
                <img class='avatar' src="assets/avatar.jpeg" alt="">
                John Doe
            </div>
        </div>
        <div class="controls">
            <div class="greetings">
                <img class='avatar' src="assets/avatar.jpeg" alt="">
                <div>
                    <h5>Hi there,</h5>
                    <h3>John Doe (@johndoe)</h3>
                </div>
            </div>
            <div class="control-buttons">
                <button>New</button>
                <BUtton>Upload</BUtton>
                <button>Share</button>
            </div>    
        </div>
    </div>
    <div class="sidebar">
        <div class="logo">
            <img src="assets/projector-screen.png" alt="">
            DASHBOARD
        </div>
        
        <div class="navigation">
            <button><img src="assets/home.png""> Home</button>
            <button><img src="assets/account.png""> Profile</button>
            <button><img src="assets/message.png""> Messages</button>
            <button><img src="assets/history.png""> History</button>
            <button><img src="assets/calendar-check.png""> Tasks</button>
            <button><img src="assets/account-multiple.png""> Communities</button>
        </div>
        <div class="branding">
            <button><img src="assets/cog.png"">Settings</button>
            <button><img src="assets/face-agent.png"">Support</button>
            <button><img src="assets/shield-lock.png"">Privacy</button>
        </div>
    </div>
    <div class="content">
        <div class="projects">
            <h3>Your Projects</h3>
        </div>
        <div class="announcemens">
            <h3>Announcements</h3>
        </div>
        <div class="trending">
            <h3>Trending</h3>
        </div>
    </div>
</body>
</html>
